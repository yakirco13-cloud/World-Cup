name: Update results
on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch: {}
permissions:
  contents: write
concurrency:
  group: update-data
  cancel-in-progress: true
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Fetch results
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: node scripts/update-results.mjs
      - name: Commit data.json if changed
        run: |
          if [ -n "$(git status --porcelain data.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data.json
            git commit -m "chore: update results"
            git push
          fi
