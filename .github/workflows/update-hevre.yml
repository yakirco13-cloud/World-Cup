name: Update hevre
on:
  schedule:
    - cron: '7,37 * * * *'
  workflow_dispatch: {}
permissions:
  contents: write
concurrency:
  group: update-hevre
  cancel-in-progress: true
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Fetch standings
        run: node scripts/update-hevre.mjs
      - name: Commit hevre.json if changed
        run: |
          if [ -n "$(git status --porcelain hevre.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add hevre.json
            git commit -m "chore: update hevre standings"
            git push
          else
            echo "No changes."
          fi
